<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ZenFeed AI</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="shell">
      <header class="header">
        <h1>ZenFeed AI</h1>
        <p class="subtitle">Hide AI-related posts on LinkedIn</p>
      </header>
      <p id="popup-error" class="error" role="alert" hidden></p>
      <p id="feed-stats" class="feed-stats" aria-live="polite"></p>
      <div class="row-toggle">
        <label for="enabled" class="label-text">
          Filter enabled
          <span class="hint-inline">Applies to open LinkedIn tabs</span>
        </label>
        <div class="switch" title="Toggle filter">
          <input type="checkbox" id="enabled" />
          <label for="enabled" class="track"><span class="thumb"></span></label>
        </div>
      </div>
      <div class="section section-field">
        <label class="field-label" for="keywords">
          <span class="field-badge" aria-hidden="true">1</span>
          <span class="field-label-text">Extra keywords</span>
        </label>
        <textarea
          id="keywords"
          placeholder="One phrase per line&#10;e.g. copilot&#10;AutoGPT"
          spellcheck="false"
          autocomplete="off"
        ></textarea>
        <p class="hint">Merged with the built-in list. Reload the tab if the feed looks stale.</p>
      </div>
      <div class="section section-field">
        <label class="field-label" for="author-whitelist">
          <span class="field-badge" aria-hidden="true">2</span>
          <span class="field-label-text">Author whitelist</span>
        </label>
        <textarea
          id="author-whitelist"
          placeholder="One name or profile slug per line&#10;e.g. Jane Doe&#10;maria-garcia-123"
          spellcheck="false"
          autocomplete="off"
        ></textarea>
        <p class="hint">
          Matching authors stay visible (name or <code>/in/</code> slug).
        </p>
      </div>
    </div>
    <footer class="credit">
      Created by
      <a
        href="https://jeanroa.dev"
        target="_blank"
        rel="noopener noreferrer"
        >Jean Roa</a
      >
      <span class="credit-sep" aria-hidden="true">·</span>
      <a
        href="https://buymeacoffee.com/jeanroa"
        target="_blank"
        rel="noopener noreferrer"
        >Support the project</a
      >
      <span class="credit-sep" aria-hidden="true">·</span>
      <a
        href="https://github.com/drakvyn/feed-fleaner-for-linkedIn"
        target="_blank"
        rel="noopener noreferrer"
        >GitHub</a
      >
    </footer>
    <script src="popup.js"></script>
  </body>
</html>
