name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Verify manifest versions match package.json
        run: npm run verify:version

      - run: npm run lint:firefox

      - run: npm run build:firefox

      - name: Upload extension zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: web-ext-artifacts/*.zip
          generate_release_notes: true
